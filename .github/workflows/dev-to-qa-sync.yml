name: IICS Dev to QA Promotion

on:
  push:
    branches:
      - dev_env  # Trigger when IICS Dev pushes a Check-in

jobs:
  promote-to-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev_env
        uses: actions/checkout@v4
        with:
          ref: dev_env
          path: dev_source

      - name: Checkout qa_env
        uses: actions/checkout@v4
        with:
          ref: qa_env
          path: qa_destination

      - name: Sanitize Metadata and Copy
        shell: pwsh
        run: |
          $sourceDir = "dev_source"
          $targetDir = "qa_destination"

          # Get all IICS files from the source branch
          $files = Get-ChildItem -Path $sourceDir -Recurse -Include *.json, *.xml -Exclude ".github/*"

          foreach ($file in $files) {
              $relativeRef = $file.FullName.Replace((Get-Location).Path + "/$sourceDir/", "")
              $destFilePath = Join-Path $targetDir $relativeRef
              $destFileDir = Split-Path $destFilePath

              if (!(Test-Path $destFileDir)) { New-Item -ItemType Directory -Path $destFileDir -Force }

              # LOGIC: Scrub IDs from JSON files (Process/Guides)
              if ($file.Extension -eq ".json") {
                  $json = Get-Content $file.FullName | ConvertFrom-Json
                  
                  # Handle both single objects and arrays
                  $objects = @()
                  if ($json -is [array]) { $objects = $json } else { $objects = @($json) }

                  foreach ($obj in $objects) {
                      if ($obj.id) { $obj.id = $null }
                      if ($obj.repoInfo) { $obj.repoInfo.repoHandle = $null }
                  }

                  $objects | ConvertTo-Json -Depth 10 | Set-Content $destFilePath
              }
              # LOGIC: Skip Connection XMLs if they already exist in QA branch
              elseif ($file.Name -like "*.conn.xml") {
                  if (!(Test-Path $destFilePath)) {
                      Copy-Item $file.FullName -Destination $destFilePath
                      Write-Host "New Connection detected: $($file.Name)"
                  } else {
                      Write-Host "Skipping existing connection to protect QA credentials: $($file.Name)"
                  }
              }
              else {
                  Copy-Item $file.FullName -Destination $destFilePath
              }
          }

      - name: Push Changes to qa_env
        working-directory: qa_destination
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Automated Promotion: Sync from dev_env (IDs sanitized)" || echo "No changes"
          git push origin qa_env
